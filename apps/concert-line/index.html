<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#12071f" />
  <title>Concert Line</title>
  <style>
    :root{--bg:#12071f;--panel:#1e1030;--line:#3a2350;--text:#f4ecff;--dim:#b39fd0;--accent:#ff5db1;--accent2:#7c5cff;}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    #root{min-height:100vh;min-height:100dvh;}
    button{font-family:inherit;}
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Fully self-contained: no backend, works with zero signal while you wait in line. -->
  <script src="bundle.js"></script>
</body>
</html>
